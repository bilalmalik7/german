<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goethe-Zertifikat A1 · Prüfungssimulator</title>
<style>
:root{
  --green:#0f7a4d; --green-dark:#0a5c3a; --green-light:#e6f4ee;
  --ink:#1a2330; --muted:#5b6878; --bg:#f4f6f9; --card:#ffffff;
  --red:#c43d3d; --amber:#b07d1e; --line:#dfe5ec; --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55}
header{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.15)}
header .logo{font-size:1.5rem;font-weight:800;letter-spacing:.5px;cursor:pointer}
header .logo span{color:#ffd34d}
header .sub{font-size:.8rem;opacity:.85}
#timer{margin-left:auto;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-weight:700;font-variant-numeric:tabular-nums;display:none}
#timer.warn{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
main{max-width:980px;margin:0 auto;padding:24px 16px 80px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:0 1px 4px rgba(20,40,60,.05)}
h1{font-size:1.7rem;margin-bottom:6px}
h2{font-size:1.25rem;margin-bottom:12px;color:var(--green-dark)}
h3{font-size:1.05rem;margin:14px 0 8px}
p.lead{color:var(--muted);margin-bottom:16px}
.grid{display:grid;gap:14px}
.grid.c2{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.grid.c4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.btn{display:inline-block;background:var(--green);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:1rem;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{background:var(--green-dark)}
.btn.sec{background:#fff;color:var(--green-dark);border:2px solid var(--green)}
.btn.sec:hover{background:var(--green-light)}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
.btn.small{padding:6px 12px;font-size:.85rem}
.btn:disabled{opacity:.45;cursor:not-allowed}
.badge{display:inline-block;background:var(--green-light);color:var(--green-dark);border-radius:20px;padding:3px 12px;font-size:.78rem;font-weight:700;margin-right:6px}
.badge.gray{background:#eef1f5;color:var(--muted)}
.module-card{cursor:pointer;transition:.15s;position:relative}
.module-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(20,40,60,.12)}
.module-card .mod-icon{font-size:2rem}
.module-card .score-chip{position:absolute;top:14px;right:14px;font-weight:800;font-size:.9rem;color:var(--green-dark)}
.task-item{border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;background:#fff}
.task-item .qnum{font-weight:800;color:var(--green-dark);margin-right:6px}
.opts{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.opt{display:flex;align-items:flex-start;gap:10px;border:2px solid var(--line);border-radius:10px;padding:10px 14px;cursor:pointer;transition:.12s;background:#fff}
.opt:hover{border-color:var(--green)}
.opt.sel{border-color:var(--green);background:var(--green-light)}
.opt .letter{font-weight:800;color:var(--green-dark);min-width:22px}
.opt.correct{border-color:var(--green);background:var(--green-light)}
.opt.wrong{border-color:var(--red);background:#fbeaea}
.rf{display:flex;gap:10px;margin-top:10px}
.rf .opt{flex:1;justify-content:center}
.readtext{background:#fbf8ef;border:1px solid #e8dfc2;border-radius:10px;padding:16px;font-family:Georgia,serif;white-space:pre-line;margin-bottom:14px}
.sign{background:#fff;border:3px solid var(--ink);border-radius:8px;padding:14px 18px;text-align:center;font-weight:700;white-space:pre-line;margin-bottom:10px;max-width:420px}
.sign .loc{display:block;font-weight:400;font-style:italic;color:var(--muted);font-size:.82rem;border:none;margin-bottom:6px}
.website{border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:#f8fafc;white-space:pre-line}
.website .url{color:#1255a0;font-weight:700;font-size:.9rem}
.playbar{display:flex;align-items:center;gap:10px;background:var(--green-light);border-radius:10px;padding:10px 14px;margin:10px 0;flex-wrap:wrap}
.playbar .count{font-size:.8rem;color:var(--muted)}
input[type=text],textarea{width:100%;border:2px solid var(--line);border-radius:10px;padding:10px 12px;font-size:1rem;font-family:inherit}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--green)}
textarea{min-height:160px;resize:vertical}
.formtable{width:100%;border-collapse:collapse;margin-top:10px}
.formtable td{border:1px solid var(--line);padding:9px 12px}
.formtable td:first-child{background:#f4f7fa;font-weight:600;width:45%}
.result-big{text-align:center;padding:30px 20px}
.result-big .total{font-size:3.2rem;font-weight:900;color:var(--green-dark)}
.result-big .pred{font-size:1.4rem;font-weight:700;margin-top:4px}
.bar{height:12px;background:#e8edf2;border-radius:8px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--green);border-radius:8px}
.feedback{margin-top:8px;padding:10px 14px;border-radius:10px;font-size:.92rem;display:none}
.feedback.ok{background:var(--green-light);color:var(--green-dark);display:block}
.feedback.no{background:#fbeaea;color:var(--red);display:block}
.muster{background:#eef6ff;border:1px solid #c8defa;border-radius:10px;padding:14px;white-space:pre-line;font-family:Georgia,serif}
.crit{display:flex;align-items:center;gap:10px;margin:6px 0}
.crit select{border:2px solid var(--line);border-radius:8px;padding:6px}
.speakcard{background:linear-gradient(135deg,#fff,#f0f7f3);border:2px solid var(--green);border-radius:14px;padding:26px;text-align:center;font-size:1.5rem;font-weight:800;cursor:pointer;min-height:120px;display:flex;flex-direction:column;justify-content:center;user-select:none}
.speakcard .theme{font-size:.8rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.speakcard .answer{font-size:1rem;font-weight:400;color:var(--green-dark);margin-top:10px}
.navrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.crumb{font-size:.85rem;color:var(--muted);margin-bottom:14px;cursor:pointer}
.crumb:hover{color:var(--green-dark)}
table.info{width:100%;border-collapse:collapse;font-size:.92rem}
table.info th,table.info td{border:1px solid var(--line);padding:8px 10px;text-align:left}
table.info th{background:var(--green-light);color:var(--green-dark)}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
.tag{font-size:.75rem;background:#eef1f5;border-radius:6px;padding:2px 8px;color:var(--muted)}
footer{text-align:center;color:var(--muted);font-size:.8rem;padding:24px}
@media(max-width:640px){h1{font-size:1.3rem}.module-card .score-chip{position:static;display:block;margin-top:6px}}
</style>
</head>

/* ---------- Helpers ---------- */
const MODS=[
 {key:'hoeren',name:'Hören',icon:'🎧',time:20,desc:'3 Teile · 15 Aufgaben · ca. 20 Min.'},
 {key:'lesen',name:'Lesen',icon:'📖',time:25,desc:'3 Teile · 15 Aufgaben · 25 Min.'},
 {key:'schreiben',name:'Schreiben',icon:'✍️',time:20,desc:'2 Teile · Formular + Mitteilung · 20 Min.'},
 {key:'sprechen',name:'Sprechen',icon:'🗣️',time:15,desc:'3 Teile · Gruppenprüfung · ca. 15 Min.'}
];
function scaled(raw){return Math.round(raw*5/3*10)/10;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function go(view,a,b){window.scrollTo(0,0);stopAudio();stopTimer();VIEWS[view](a,b);}

/* ---------- Views ---------- */
const VIEWS={};

 let prog='';

  prog+=`<div class="card module-card" onclick="go('examMenu',${i})">
    <h2>📋 ${e.name}</h2><div class="pill-row">${chips}</div>

 ${prog}
 <div class="card">
  <h2>ℹ️ Prüfungsformat</h2>
  <table class="info">
   <tr><th>Modul</th><th>Teile</th><th>Aufgaben</th><th>Zeit</th><th>Punkte</th></tr>
   <tr><td>Hören</td><td>3</td><td>15</td><td>ca. 20 Min.</td><td>25</td></tr>
   <tr><td>Lesen</td><td>3</td><td>15</td><td>25 Min.</td><td>25</td></tr>
   <tr><td>Schreiben</td><td>2</td><td>Formular + Text (ca. 30 Wörter)</td><td>20 Min.</td><td>25</td></tr>

 </div>
 <div class="card">
  <h2>🇵🇰 Prüfung in Pakistan</h2>
  <table class="info">
   <tr><th>Stadt</th><th>Prüfungszentrum</th></tr>
   <tr><td>Karachi</td><td>Goethe-Institut Pakistan</td></tr>
   <tr><td>Lahore</td><td>Annemarie-Schimmel-Haus, Scotch Corner, 155 St 3, Upper Mall Scheme</td></tr>
   <tr><td>Islamabad</td><td>NUML, 4 Khayaban-e-Johar, H-9/4</td></tr>
  </table>
  <p style="margin-top:10px">Gebühr A1: ca. <strong>Rs. 11.000</strong> (interne Kandidaten; externe Kandidaten zahlen mehr). Prüfungstermine gibt es fast jeden Monat. Anmeldung und aktuelle Termine: <strong>goethe.de/pakistan</strong>. Das A1-Zertifikat braucht man u. a. für das Visum zur Familienzusammenführung und für viele Au-pair- und Ausbildungsprogramme in Deutschland.</p>

};

VIEWS.examMenu=function(i){
 curEx=i;const e=EXAMS[i],st=ex(i);
 let cards='';
 MODS.forEach(m=>{
  const d=st[m.key];
  cards+=`<div class="card module-card" onclick="go('${m.key}',${i})">
   <div class="mod-icon">${m.icon}</div><h2>${m.name}</h2>
   <p style="color:var(--muted);font-size:.9rem">${m.desc}</p>
   ${d&&d.done?`<div class="score-chip">✅ ${scaled(d.raw)} / 25</div>`:''}
   <button class="btn small" style="margin-top:10px">${d&&d.done?'Wiederholen':'Starten'}</button>
  </div>`;
 });
 const allDone=MODS.every(m=>st[m.key]&&st[m.key].done);
 app.innerHTML=`
 <div class="crumb" onclick="go('home')">← Übersicht</div>
 <h1>📋 ${e.name}</h1>
 <p class="lead">Empfohlene Reihenfolge wie in der echten Prüfung: Hören → Lesen → Schreiben → Sprechen.</p>
 <div class="grid c2">${cards}</div>
 <div class="navrow">
  <button class="btn ${allDone?'':'sec'}" onclick="go('results',${i})">📊 Ergebnis ansehen</button>
  <button class="btn ghost" onclick="if(confirm('Alle Antworten von ${e.name} löschen?')){delete S[${i}];save();go('examMenu',${i})}">Zurücksetzen</button>
 </div>`;
};

/* ---------- Hören ---------- */
VIEWS.hoeren=function(i){
 curEx=i;const H=EXAMS[i].hoeren;const st=ex(i);st.hoeren=st.hoeren||{ans:{},done:false};
 let n=0,html='';
 const item=(idx,inner)=>`<div class="task-item" id="task_${idx}">${inner}</div>`;
 const playbar=(part,idx,times)=>`<div class="playbar">▶️ <button class="btn small" onclick="playH('${part}',${idx},${times})">Audio abspielen</button> <button class="btn small ghost" onclick="stopAudio()">⏹ Stopp</button><span class="count">Sie hören den Text ${times===2?'zweimal':'einmal'}.</span></div>`;
 H.teil1.forEach((t,k)=>{n++;
  html+=item('t1_'+k,`<span class="qnum">${n}.</span> <strong>${esc(t.q)}</strong>${playbar('teil1',k,2)}
   <div class="opts">${t.opts.map((o,oi)=>`<div class="opt" id="h_t1_${k}_${oi}" onclick="pickH('t1',${k},${oi},3)"><span class="letter">${'abc'[oi]}</span> ${esc(o)}</div>`).join('')}</div>`);
 });
 let t2='';H.teil2.forEach((t,k)=>{n++;
  t2+=item('t2_'+k,`<span class="qnum">${n}.</span> <strong>${esc(t.s)}</strong>${playbar('teil2',k,1)}
   <div class="rf"><div class="opt" id="h_t2_${k}_1" onclick="pickH('t2',${k},1,0)">Richtig</div><div class="opt" id="h_t2_${k}_0" onclick="pickH('t2',${k},0,0)">Falsch</div></div>`);
 });
 let t3='';H.teil3.forEach((t,k)=>{n++;
  t3+=item('t3_'+k,`<span class="qnum">${n}.</span> <strong>${esc(t.q)}</strong>${playbar('teil3',k,2)}
   <div class="opts">${t.opts.map((o,oi)=>`<div class="opt" id="h_t3_${k}_${oi}" onclick="pickH('t3',${k},${oi},3)"><span class="letter">${'abc'[oi]}</span> ${esc(o)}</div>`).join('')}</div>`);
 });
 app.innerHTML=`
 <div class="crumb" onclick="go('examMenu',${i})">← ${EXAMS[i].name}</div>
 <h1>🎧 Hören <span class="badge">ca. 20 Minuten</span></h1>
 <p class="lead">Dieser Test hat drei Teile. Sie hören kurze Gespräche und Ansagen. Lesen Sie zuerst die Aufgabe, hören Sie dann den Text dazu. <em>Tipp: Für das Audio braucht Ihr Browser eine deutsche Stimme (Text-to-Speech).</em></p>
 <div class="card"><h2>Teil 1 · Was ist richtig? Kreuzen Sie an: a, b oder c.</h2>${html}</div>
 <div class="card"><h2>Teil 2 · Kreuzen Sie an: Richtig oder Falsch.</h2>${t2}</div>
 <div class="card"><h2>Teil 3 · Was ist richtig? Kreuzen Sie an: a, b oder c.</h2>${t3}</div>
 <div class="navrow"><button class="btn" onclick="scoreH(${i})">✅ Abgeben und auswerten</button></div>
 <div id="hres"></div>`;
 startTimer(20);
 if(st.hoeren.done)scoreH(i,true);
};
window.playH=function(part,idx,times){playScript(EXAMS[curEx].hoeren[part==='teil1'?'teil1':part==='teil2'?'teil2':'teil3'][idx].script,times);};
window.pickH=function(teil,k,v,nOpts){
 const st=ex(curEx);st.hoeren=st.hoeren||{ans:{}};st.hoeren.ans[teil+'_'+k]=v;save();
 if(teil==='t2'){[0,1].forEach(o=>document.getElementById(`h_t2_${k}_${o}`).classList.toggle('sel',o===v));}
 else{for(let o=0;o<nOpts;o++)document.getElementById(`h_${teil}_${k}_${o}`).classList.toggle('sel',o===v);}
};
window.scoreH=function(i,silent){
 stopAudio();const H=EXAMS[i].hoeren,st=ex(i);st.hoeren=st.hoeren||{ans:{}};
 let raw=0;
 H.teil1.forEach((t,k)=>{const a=st.hoeren.ans['t1_'+k];for(let o=0;o<3;o++){const el=document.getElementById(`h_t1_${k}_${o}`);el.classList.remove('correct','wrong');if(o===t.correct)el.classList.add('correct');else if(a===o)el.classList.add('wrong');}if(a===t.correct)raw++;});
 H.teil2.forEach((t,k)=>{const a=st.hoeren.ans['t2_'+k],c=t.correct?1:0;[0,1].forEach(o=>{const el=document.getElementById(`h_t2_${k}_${o}`);el.classList.remove('correct','wrong');if(o===c)el.classList.add('correct');else if(a===o)el.classList.add('wrong');});if(a===c)raw++;});
 H.teil3.forEach((t,k)=>{const a=st.hoeren.ans['t3_'+k];for(let o=0;o<3;o++){const el=document.getElementById(`h_t3_${k}_${o}`);el.classList.remove('correct','wrong');if(o===t.correct)el.classList.add('correct');else if(a===o)el.classList.add('wrong');}if(a===t.correct)raw++;});
 st.hoeren.raw=raw;st.hoeren.done=true;save();stopTimer();
 document.getElementById('hres').innerHTML=`<div class="card result-big"><div class="total">${raw} / 15</div><div class="pred">= ${scaled(raw)} von 25 Punkten</div><div class="navrow" style="justify-content:center"><button class="btn" onclick="go('lesen',${i})">Weiter: Lesen →</button><button class="btn sec" onclick="go('examMenu',${i})">Zur Übersicht</button></div></div>`;
 if(!silent)document.getElementById('hres').scrollIntoView({behavior:'smooth'});
};

/* ---------- Lesen ---------- */
VIEWS.lesen=function(i){
 curEx=i;const L=EXAMS[i].lesen,st=ex(i);st.lesen=st.lesen||{ans:{},done:false};
 let n=0,t1='';
 L.teil1.forEach((blk,b)=>{
  t1+=`<div class="readtext">${esc(blk.text)}</div>`;
  blk.items.forEach((it,k)=>{n++;
   t1+=`<div class="task-item"><span class="qnum">${n}.</span> ${esc(it.s)}
    <div class="rf"><div class="opt" id="l_t1_${b}_${k}_1" onclick="pickL('t1_${b}_${k}',1)">Richtig</div><div class="opt" id="l_t1_${b}_${k}_0" onclick="pickL('t1_${b}_${k}',0)">Falsch</div></div></div>`;
  });
 });
 let t2='';
 L.teil2.forEach((t,k)=>{n++;
  t2+=`<div class="task-item"><span class="qnum">${n}.</span> <strong>${esc(t.sit)}</strong> <em style="color:var(--muted)">Wo finden Sie Informationen?</em>
   <div class="grid c2" style="margin-top:10px">
    <div class="opt" id="l_t2_${k}_0" onclick="pickL('t2_${k}',0)" style="flex-direction:column;align-items:flex-start"><span class="letter">a</span><div class="website"><span class="url">${esc(t.a.url)}</span>\n${esc(t.a.txt)}</div></div>
    <div class="opt" id="l_t2_${k}_1" onclick="pickL('t2_${k}',1)" style="flex-direction:column;align-items:flex-start"><span class="letter">b</span><div class="website"><span class="url">${esc(t.b.url)}</span>\n${esc(t.b.txt)}</div></div>
   </div></div>`;
 });
 let t3='';
 L.teil3.forEach((t,k)=>{n++;
  t3+=`<div class="task-item"><div class="sign"><span class="loc">${esc(t.loc)}</span>${esc(t.sign)}</div>
   <span class="qnum">${n}.</span> ${esc(t.s)}
   <div class="rf"><div class="opt" id="l_t3_${k}_1" onclick="pickL('t3_${k}',1)">Richtig</div><div class="opt" id="l_t3_${k}_0" onclick="pickL('t3_${k}',0)">Falsch</div></div></div>`;
 });
 app.innerHTML=`
 <div class="crumb" onclick="go('examMenu',${i})">← ${EXAMS[i].name}</div>
 <h1>📖 Lesen <span class="badge">25 Minuten</span></h1>
 <p class="lead">Dieser Test hat drei Teile. Sie lesen kurze Briefe, Anzeigen usw. Zu jedem Text gibt es Aufgaben. Wörterbücher sind nicht erlaubt.</p>
 <div class="card"><h2>Teil 1 · Lesen Sie die Texte. Richtig oder Falsch?</h2>${t1}</div>
 <div class="card"><h2>Teil 2 · Wo finden Sie Informationen? Kreuzen Sie an: a oder b.</h2>${t2}</div>
 <div class="card"><h2>Teil 3 · Lesen Sie die Schilder. Richtig oder Falsch?</h2>${t3}</div>
 <div class="navrow"><button class="btn" onclick="scoreL(${i})">✅ Abgeben und auswerten</button></div>
 <div id="lres"></div>`;
 startTimer(25);
 if(st.lesen.done)scoreL(i,true);
};
window.pickL=function(key,v){
 const st=ex(curEx);st.lesen=st.lesen||{ans:{}};st.lesen.ans[key]=v;save();
 const nOpts=2;for(let o=0;o<nOpts;o++){const el=document.getElementById(`l_${key.split('_')[0]==='t2'?key:key}_${o}`)||document.getElementById(`l_${key}_${o}`);if(el)el.classList.toggle('sel',o===v);}
};
window.scoreL=function(i,silent){
 const L=EXAMS[i].lesen,st=ex(i);st.lesen=st.lesen||{ans:{}};let raw=0;
 const mark=(key,correct)=>{const a=st.lesen.ans[key];[0,1].forEach(o=>{const el=document.getElementById(`l_${key}_${o}`);if(!el)return;el.classList.remove('correct','wrong');if(o===correct)el.classList.add('correct');else if(a===o)el.classList.add('wrong');});return a===correct;};
 L.teil1.forEach((blk,b)=>blk.items.forEach((it,k)=>{if(mark(`t1_${b}_${k}`,it.correct?1:0))raw++;}));
 L.teil2.forEach((t,k)=>{if(mark(`t2_${k}`,t.correct))raw++;});
 L.teil3.forEach((t,k)=>{if(mark(`t3_${k}`,t.correct?1:0))raw++;});
 st.lesen.raw=raw;st.lesen.done=true;save();stopTimer();
 document.getElementById('lres').innerHTML=`<div class="card result-big"><div class="total">${raw} / 15</div><div class="pred">= ${scaled(raw)} von 25 Punkten</div><div class="navrow" style="justify-content:center"><button class="btn" onclick="go('schreiben',${i})">Weiter: Schreiben →</button><button class="btn sec" onclick="go('examMenu',${i})">Zur Übersicht</button></div></div>`;
 if(!silent)document.getElementById('lres').scrollIntoView({behavior:'smooth'});
};

/* ---------- Schreiben ---------- */
VIEWS.schreiben=function(i){
 curEx=i;const W=EXAMS[i].schreiben,st=ex(i);st.schreiben=st.schreiben||{t1:{},t2:'',crit:[null,null,null,null],done:false};
 let rows='';
 W.teil1.fields.forEach((f,k)=>{
  if(f.given&&!f.answers){rows+=`<tr><td>${esc(f.label)}</td><td>${esc(f.given)}</td></tr>`;}
  else{const pre=f.given?esc(f.given):'';rows+=`<tr><td>${esc(f.label)} ✏️</td><td>${pre}<input type="text" id="sw1_${k}" value="${esc(st.schreiben.t1[k]||'')}" oninput="ex(curEx).schreiben.t1[${k}]=this.value;save()" placeholder="…"><div class="feedback" id="sw1fb_${k}"></div></td></tr>`;}
 });
 const pts=W.teil2.points.map(p=>`<li>${esc(p)}</li>`).join('');
 app.innerHTML=`
 <div class="crumb" onclick="go('examMenu',${i})">← ${EXAMS[i].name}</div>
 <h1>✍️ Schreiben <span class="badge">20 Minuten</span></h1>
 <div class="card"><h2>Teil 1 · Formular (5 Punkte)</h2>
  <p>${esc(W.teil1.scenario).replace(/\n/g,'<br>')}</p>
  <h3>${esc(W.teil1.formTitle)}</h3>
  <table class="formtable">${rows}</table>
 </div>
 <div class="card"><h2>Teil 2 · Kurze Mitteilung (10 Punkte)</h2>
  <p><strong>${esc(W.teil2.task)}</strong></p><ul style="margin:8px 0 8px 22px">${pts}</ul>
  <p style="color:var(--muted);font-size:.9rem">Schreiben Sie zu jedem Punkt ein bis zwei Sätze (circa 30 Wörter). Schreiben Sie auch eine Anrede und einen Gruß.</p>
  <textarea id="sw2" oninput="ex(curEx).schreiben.t2=this.value;save();document.getElementById('wc').textContent=this.value.trim()?this.value.trim().split(/\\s+/).length:0">${esc(st.schreiben.t2||'')}</textarea>
  <p style="text-align:right;color:var(--muted);font-size:.85rem"><span id="wc">${st.schreiben.t2?st.schreiben.t2.trim().split(/\s+/).length:0}</span> Wörter</p>
 </div>
 <div class="navrow"><button class="btn" onclick="scoreW(${i})">✅ Abgeben und auswerten</button></div>
 <div id="wres"></div>`;
 startTimer(20);
 if(st.schreiben.done)scoreW(i,true);
};
function norm(s){return (s||'').toLowerCase().trim().replace(/[.,!]/g,'').replace(/\s+/g,' ');}
window.scoreW=function(i,silent){
 const W=EXAMS[i].schreiben,st=ex(i);let t1raw=0;
 W.teil1.fields.forEach((f,k)=>{
  if(!f.answers)return;
  const valEl=document.getElementById('sw1_'+k);const val=norm(valEl?valEl.value:st.schreiben.t1[k]);
  const ok=f.answers.some(a=>val===norm(a)||val.includes(norm(a)));
  if(ok)t1raw++;
  const fb=document.getElementById('sw1fb_'+k);
  if(fb){fb.className='feedback '+(ok?'ok':'no');fb.textContent=ok?'✓ Richtig':'✗ Erwartet z. B.: '+f.answers[0];}
 });
 st.schreiben.t1raw=t1raw;st.schreiben.done=true;save();stopTimer();
 const crit=st.schreiben.crit||[null,null,null,null];
 const critRow=(idx,label,vals)=>`<div class="crit"><select onchange="ex(curEx).schreiben.crit[${idx}]=parseFloat(this.value);save();updW(${i})"><option value="">– Punkte wählen –</option>${vals.map(v=>`<option value="${v}" ${crit[idx]===v?'selected':''}>${v} Punkte</option>`).join('')}</select><span>${label}</span></div>`;
 document.getElementById('wres').innerHTML=`
 <div class="card"><h2>Auswertung Teil 1: ${t1raw} / 5 Punkte</h2></div>
 <div class="card"><h2>Auswertung Teil 2 (Selbstbewertung, max. 10 Punkte)</h2>
  <p class="lead">Vergleichen Sie Ihren Text mit der Musterlösung und bewerten Sie sich selbst – wie die echten Prüfer:</p>
  <div class="muster"><strong>Musterlösung:</strong>\n\n${esc(W.teil2.muster)}</div>
  <h3>Bewertungskriterien</h3>
  ${critRow(0,'Inhaltspunkt 1 erfüllt? (voll = 3 / teilweise = 1,5 / nicht = 0)',[3,1.5,0])}
  ${critRow(1,'Inhaltspunkt 2 erfüllt?',[3,1.5,0])}
  ${critRow(2,'Inhaltspunkt 3 erfüllt?',[3,1.5,0])}
  ${critRow(3,'Anrede und Gruß vorhanden? (1 / 0,5 / 0)',[1,0.5,0])}
  <div id="wtotal" style="margin-top:14px"></div>
 </div>`;
 updW(i);
 if(!silent)document.getElementById('wres').scrollIntoView({behavior:'smooth'});
};
window.updW=function(i){
 const st=ex(i);const crit=st.schreiben.crit||[];
 const t2=crit.reduce((s,v)=>s+(v||0),0);
 const raw=(st.schreiben.t1raw||0)+t2;st.schreiben.raw=raw;save();
 document.getElementById('wtotal').innerHTML=`<div class="result-big"><div class="total">${raw} / 15</div><div class="pred">= ${scaled(raw)} von 25 Punkten</div><div class="navrow" style="justify-content:center"><button class="btn" onclick="go('sprechen',${i})">Weiter: Sprechen →</button><button class="btn sec" onclick="go('examMenu',${i})">Zur Übersicht</button></div></div>`;
};

/* ---------- Sprechen ---------- */
VIEWS.sprechen=function(i){
 curEx=i;const P=EXAMS[i].sprechen,st=ex(i);st.sprechen=st.sprechen||{s1:null,s2:null,s3:null,done:false};
 const card=(idx,part)=>{const c=P[part][idx];
  return `<div class="speakcard" id="sc_${part}_${idx}" onclick="flipCard('${part}',${idx})">
   ${c.theme?`<span class="theme">Thema: ${esc(c.theme)}</span>`:''}
   <div>${esc(c.wort)}</div>
   <div class="answer" id="sca_${part}_${idx}" style="display:none">
    ${part==='teil2'?`<strong>Frage:</strong> ${esc(c.f)}<br><strong>Antwort:</strong> ${esc(c.a)}`:`<strong>Bitte:</strong> ${esc(c.bitte)}<br><strong>Reaktion:</strong> ${esc(c.reaktion)}`}
    <br><button class="btn small" style="margin-top:8px" onclick="event.stopPropagation();speakCard('${part}',${idx})">🔊 Anhören</button>
   </div>
   <span style="font-size:.75rem;color:var(--muted);margin-top:8px">Klicken = Beispiel zeigen</span>
  </div>`;};
 const sel=(key,max,label)=>`<div class="crit"><select onchange="ex(curEx).sprechen.${key}=parseFloat(this.value);save();updS(${i})"><option value="">– Punkte –</option>${Array.from({length:max*2+1},(_,k)=>k/2).reverse().map(v=>`<option value="${v}" ${st.sprechen[key]===v?'selected':''}>${v}</option>`).join('')}</select><span>${label} (max. ${max})</span></div>`;
 app.innerHTML=`
 <div class="crumb" onclick="go('examMenu',${i})">← ${EXAMS[i].name}</div>
 <h1>🗣️ Sprechen <span class="badge">ca. 15 Minuten</span></h1>
 <p class="lead">Die mündliche Prüfung ist eine Gruppenprüfung mit maximal 4 Teilnehmenden. Üben Sie laut – am besten mit einem Partner!</p>
 <div class="card"><h2>Teil 1 · Sich vorstellen (3 Punkte)</h2>
  <p>Stellen Sie sich vor. Sprechen Sie laut zu diesen Stichworten:</p>
  <div class="pill-row"><span class="badge">Name?</span><span class="badge">Alter?</span><span class="badge">Land?</span><span class="badge">Wohnort?</span><span class="badge">Sprachen?</span><span class="badge">Beruf?</span><span class="badge">Hobby?</span></div>
  <p style="margin-top:8px"><em>Danach:</em> Buchstabieren Sie Ihren Namen und nennen Sie Ihre Telefonnummer – das fragen die Prüfer immer!</p>
  <div class="muster" style="margin-top:10px">Beispiel: Mein Name ist Ali Khan. Ich bin 25 Jahre alt. Ich komme aus Pakistan, aus Lahore. Ich wohne in Lahore. Ich spreche Urdu, Punjabi, Englisch und ein bisschen Deutsch. Ich bin Student. Mein Hobby ist Cricket.\n\nBuchstabieren: A-L-I  K-H-A-N · Telefonnummer: null drei null null – eins zwei drei vier fünf sechs sieben</div>
 </div>
 <div class="card"><h2>Teil 2 · Um Informationen bitten und geben (6 Punkte)</h2>
  <p>Ziehen Sie eine Karte, stellen Sie eine Frage zum Thema. Ihr Partner antwortet.</p>
  <div class="grid c2" style="margin-top:12px">${P.teil2.map((_,k)=>card(k,'teil2')).join('')}</div>
 </div>
 <div class="card"><h2>Teil 3 · Bitten formulieren und reagieren (6 Punkte)</h2>
  <p>Ziehen Sie eine Karte und formulieren Sie eine Bitte. Ihr Partner reagiert.</p>
  <div class="grid c2" style="margin-top:12px">${P.teil3.map((_,k)=>card(k,'teil3')).join('')}</div>
 </div>
 <div class="card"><h2>Selbstbewertung</h2>
  <p class="lead">Volle Punktzahl = Aufgabe voll erfüllt und verständlich · halbe Punktzahl = teilweise erfüllt · 0 = nicht erfüllt.</p>
  ${sel('s1',3,'Teil 1: Sich vorstellen')}
  ${sel('s2',6,'Teil 2: Fragen und Antworten')}
  ${sel('s3',6,'Teil 3: Bitten und Reaktionen')}
  <div id="stotal" style="margin-top:14px"></div>
 </div>`;
 updS(i);
};
window.flipCard=function(part,idx){const a=document.getElementById(`sca_${part}_${idx}`);a.style.display=a.style.display==='none'?'block':'none';};
window.speakCard=function(part,idx){const c=EXAMS[curEx].sprechen[part][idx];
 playScript(part==='teil2'?[[0,c.f],[1,c.a]]:[[0,c.bitte],[1,c.reaktion]],1);};
window.updS=function(i){
 const st=ex(i);const sp=st.sprechen;
 if(sp.s1!=null&&sp.s2!=null&&sp.s3!=null){
  const raw=sp.s1+sp.s2+sp.s3;sp.raw=raw;sp.done=true;save();
  document.getElementById('stotal').innerHTML=`<div class="result-big"><div class="total">${raw} / 15</div><div class="pred">= ${scaled(raw)} von 25 Punkten</div><div class="navrow" style="justify-content:center"><button class="btn" onclick="go('results',${i})">📊 Gesamtergebnis →</button></div></div>`;
 } else document.getElementById('stotal').innerHTML='<p style="color:var(--muted)">Bewerten Sie alle drei Teile, um das Ergebnis zu sehen.</p>';
};

/* ---------- Results ---------- */
VIEWS.results=function(i){
 const st=ex(i);let total=0,all=true,rows='';
 MODS.forEach(m=>{
  const d=st[m.key];const sc=d&&d.done?scaled(d.raw):null;
  if(sc==null)all=false;else total+=sc;
  rows+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between"><strong>${m.icon} ${m.name}</strong><span>${sc!=null?sc+' / 25':'– noch nicht gemacht –'}</span></div><div class="bar"><i style="width:${sc!=null?sc*4:0}%"></i></div></div>`;
 });
 total=Math.round(total*10)/10;
 let pred='',col='var(--green-dark)';
 if(!all)pred='Noch nicht alle Module abgeschlossen';
 else if(total>=90)pred='Sehr gut – bestanden! 🎉';
 else if(total>=80)pred='Gut – bestanden! 🎉';
 else if(total>=70)pred='Befriedigend – bestanden! ✅';
 else if(total>=60)pred='Ausreichend – bestanden ✅';
 else{pred='Leider nicht bestanden – weiter üben! 💪';col='var(--red)';}
 app.innerHTML=`
 <div class="crumb" onclick="go('examMenu',${i})">← ${EXAMS[i].name}</div>
 <h1>📊 Gesamtergebnis · ${EXAMS[i].name}</h1>
 <div class="card result-big"><div class="total" style="color:${col}">${all?total:'–'} / 100</div><div class="pred" style="color:${col}">${pred}</div></div>
 <div class="card">${rows}
 <p style="color:var(--muted);font-size:.88rem;margin-top:8px">Bestehensgrenze: 60 Punkte. Prädikate: sehr gut 90–100 · gut 80–89,5 · befriedigend 70–79,5 · ausreichend 60–69,5.</p></div>
 <div class="card"><h2>📤 Ergebnis an den Kursleiter senden</h2>
  <p style="margin-bottom:10px">Geben Sie Ihren Namen ein und senden Sie Ihr Ergebnis ab:</p>
  <input type="text" id="pname" placeholder="Ihr Name (z. B. Ali Khan)" value="${esc(S.name||'')}" style="max-width:380px">
  <div class="navrow"><button class="btn" id="sendBtn" onclick="sendResult(${i})">📤 Ergebnis senden</button></div>
  <div id="sendfb" class="feedback"></div>
 </div>
 <div class="navrow"><button class="btn" onclick="go('home')">Zur Übersicht</button><button class="btn sec" onclick="if(confirm('Alle Antworten löschen?')){delete S[${i}];save();go('examMenu',${i})}">Test zurücksetzen</button></div>`;
};

window.sendResult=async function(i){
 const name=document.getElementById('pname').value.trim();
 if(!name){alert('Bitte geben Sie zuerst Ihren Namen ein.');return;}
 S.name=name;save();
 const st=ex(i);
 const data={_subject:'Goethe A1 Ergebnis: '+name+' ('+EXAMS[i].name+')',_template:'table',Name:name,Test:EXAMS[i].name,Datum:new Date().toLocaleString('de-DE')};
 let total=0,all=true;
 MODS.forEach(m=>{const d=st[m.key];const sc=d&&d.done?scaled(d.raw):null;
  data[m.name]=sc!=null?sc+' / 25':'nicht gemacht';
  if(sc!=null)total+=sc;else all=false;});
 total=Math.round(total*10)/10;
 data.Gesamt=(all?total:total+' (unvollständig)')+' / 100';
 if(all)data.Bestanden=total>=60?'JA ✓':'NEIN ✗';
 const btn=document.getElementById('sendBtn'),fb=document.getElementById('sendfb');
 btn.disabled=true;btn.textContent='Wird gesendet…';
 try{
  const r=await fetch('https://formsubmit.co/ajax/'+RESULT_EMAIL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(data)});
  const j=await r.json();
  if(j&&(j.success===true||j.success==='true')){fb.className='feedback ok';fb.textContent='✓ Ihr Ergebnis wurde gesendet. Vielen Dank!';btn.textContent='Gesendet ✓';}
  else throw new Error('fail');
 }catch(e){fb.className='feedback no';fb.textContent='✗ Senden fehlgeschlagen. Bitte prüfen Sie Ihre Internetverbindung und versuchen Sie es noch einmal.';btn.disabled=false;btn.textContent='📤 Ergebnis senden';}
};

go('home');
</script>
</body>
</html>
